<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
<title>Wheel of Fate</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Cinzel+Decorative:wght@400;700;900&family=MedievalSharp&family=UnifrakturMaguntia&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --bg4: #222222;
    --border: #333333;
    --border2: #444444;
    --accent: #c8980a;
    --accent2: #d4a820;
    --text: #ffffff;
    --text2: #aaaaaa;
    --text3: #666666;
    --nav-bg: #161616;
    --btn-bg: #1c1c1c;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  #app {
    width: 100%;
    max-width: 430px;
    height: 100dvh;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }

  /* HEADER CENTER */
  #header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 18px 0px;
    flex-shrink: 0;
  }

  #wheel-icon {
    width: 38px;
    height: 38px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wheel-icon-svg {
    width: 38px;
    height: 38px;
    stroke: #d4a820;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 8px rgba(200,155,20,0.55));
  }

  #title-card {
    background: rgba(10,7,2,0.85);
    border: 1px solid rgba(160,120,30,0.5);
    border-top-color: rgba(220,180,60,0.7);
    border-radius: 3px;
    padding: 8px 28px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Cinzel Decorative', serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    background-image: linear-gradient(180deg, #fffbe8 0%, #f0d878 20%, #c8980a 45%, #e8c84a 60%, #a07008 75%, #d4a820 90%, #f5e080 100%);
    filter: drop-shadow(0 0 8px rgba(200,155,20,0.4));
    margin-bottom: 6px;
  }

  #result-text-svg {
    display: block;
    width: 100%;
    height: 46px;
    overflow: visible;
  }
  #result-text {
    /* SVG text element — styled via attributes */
  }

  /* WHEEL AREA */
  #wheel-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
  }

  #canvas-container {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #reward-panel {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 30;
    text-align: center;
    white-space: nowrap;
    animation: rpPopIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes rpPopIn {
    from { opacity: 0; transform: translateX(-50%) scale(0.85) translateY(4px); }
    to   { opacity: 1; transform: translateX(-50%) scale(1)    translateY(0);   }
  }
  #reward-panel .rp-name {
    display: none;
  }
  #reward-panel .rp-stats {
    font-size: 18px;
    font-weight: 700;
    margin-top: 2px;
    display: block;
    text-shadow: 0 1px 4px rgba(0,0,0,1);
  }
  .rp-pos { color: #55ee77; }
  .rp-neg { color: #ff5544; }
  .rp-neu { color: #666; }

  /* Animated stat chips */
  @keyframes statChipIn {
    0%   { opacity: 0; transform: translateY(18px) scale(0.75); }
    60%  { opacity: 1; transform: translateY(-3px) scale(1.08); }
    100% { opacity: 1; transform: translateY(0px) scale(1); }
  }
  .stat-chip {
    display: inline-block;
    opacity: 0;
    animation: statChipIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    will-change: transform, opacity;
  }
  .stat-chip-sep {
    display: inline-block;
    opacity: 0;
    animation: statChipIn 0.28s ease forwards;
    will-change: opacity;
  }

  #wheel-canvas {
    display: block;
    border-radius: 50%;
  }

  /* BOTTOM CONTROLS */
  #bottom-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px 10px;
    flex-shrink: 0;
    gap: 10px;
  }

  .ctrl-btn-round {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .ctrl-btn-round:active { background: var(--bg4); }
  .ctrl-btn-round svg { width: 18px; height: 18px; fill: none; stroke: var(--text2); stroke-width: 2.2; stroke-linecap: round; }

  #reset-btn {
    flex: 1;
    height: 44px;
    border-radius: 22px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--accent2);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: background 0.15s;
  }
  #reset-btn:active { background: var(--bg4); }

  .ctrl-btn-edit {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: transparent;
    border: 1px solid rgba(160,120,30,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .ctrl-btn-edit:active { background: rgba(61,142,240,0.1); }
  .ctrl-btn-edit svg { width: 18px; height: 18px; fill: none; stroke: var(--accent2); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  /* BOTTOM NAV */
  #bottom-nav {
    margin: 0 12px 10px;
    background: var(--nav-bg);
    border: 1px solid var(--border);
    border-radius: 26px;
    display: flex;
    align-items: center;
    padding: 6px 4px;
    flex-shrink: 0;
    gap: 2px;
  }

  .nav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 4px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .nav-tab.active {
    background: #2a2a2a;
  }

  .nav-tab svg {
    width: 22px; height: 22px;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav-tab.active svg { stroke: var(--accent2); }
  .nav-tab:not(.active) svg { stroke: var(--text3); }

  .nav-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .nav-tab.active .nav-label { color: var(--accent2); }
  .nav-tab:not(.active) .nav-label { color: var(--text3); }

  .nav-tab:not(.active):active { background: #1e1e1e; }

  /* ── MOBILE (iPhone / Android) ── */
  @media screen and (max-width: 430px) {
    #app {
      max-width: 100%;
    }

    #wheel-area {
      padding-top: 18px;
    }

    #header-center {
      padding: 6px 14px 0px;
    }

    #wheel-icon {
      width: 28px;
      height: 28px;
      margin-bottom: 2px;
    }

    .wheel-icon-svg {
      width: 28px;
      height: 28px;
    }

    #champion-name-display {
      font-size: 8px !important;
      letter-spacing: 2px !important;
      min-height: 12px !important;
      margin-bottom: 1px !important;
    }

    #title-card {
      font-size: 11px !important;
      padding: 5px 16px !important;
      margin-bottom: 3px !important;
      letter-spacing: 2px !important;
    }

    #result-text-svg {
      height: 38px;
    }

    #result-text {
      font-size: 32 !important;
    }

    .rp-stats {
      font-size: 14px !important;
    }

    .stat-chip {
      font-size: 14px !important;
    }

    #bottom-controls {
      padding: 8px 14px 8px;
      gap: 8px;
    }

    .ctrl-btn-round {
      width: 36px !important;
      height: 36px !important;
    }

    .ctrl-btn-main {
      height: 36px !important;
      font-size: 12px !important;
      letter-spacing: 1px !important;
    }

    .ctrl-btn-edit {
      width: 36px !important;
      height: 36px !important;
    }
  }

</style>
</head>

  <!-- TOP BAR -->
  <!-- HEADER CENTER -->
  <div id="header-center">
    <div id="wheel-icon"></div>
    <div id="champion-name-display" style="font-size:9px;font-family:'Cinzel Decorative',serif;color:rgba(210,175,80,0.75);font-weight:400;letter-spacing:3px;text-transform:uppercase;min-height:16px;margin-bottom:2px;"></div>
    <div id="title-card">Race</div>
    <svg id="result-text-svg" width="100%" height="46" style="display:block;overflow:visible;filter:drop-shadow(0 0 12px rgba(200,155,20,0.6));">

  <script>
  (function() {
    // ── FOG PAINTER (drifting warm mist layers) ──────────────────────
    let fogLayers = null;
    function initFogLayers(W, H) {
      fogLayers = Array.from({length: 10}, (_, i) => ({
        x:      Math.random() * W * 1.6 - W * 0.3,
        y:      H * (0.35 + Math.random() * 0.55),
        rX:     W * (0.28 + Math.random() * 0.42),
        rY:     H * (0.055 + Math.random() * 0.09),
        speedX: 0.08 + Math.random() * 0.18,
        speedY: (Math.random() - 0.5) * 0.035,
        alpha:  0.038 + Math.random() * 0.07,
        hue:    28 + Math.random() * 22,
        sat:    18 + Math.random() * 20,
        phase:  Math.random() * Math.PI * 2,
        pulseSpeed: 0.0005 + Math.random() * 0.001,
      }));
    }

    function drawFog(fogCanvas, W, H) {
      const ctx = fogCanvas.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      const t = performance.now();
      for (const l of fogLayers) {
        const pulse = 1 + 0.12 * Math.sin(t * l.pulseSpeed + l.phase);
        const rX = l.rX * pulse;
        const rY = l.rY * pulse;
        const grd = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, Math.max(rX, rY));
        grd.addColorStop(0,    `hsla(${l.hue},${l.sat}%,58%,${l.alpha})`);
        grd.addColorStop(0.42, `hsla(${l.hue},${l.sat}%,35%,${l.alpha * 0.45})`);
        grd.addColorStop(1,    'hsla(0,0%,0%,0)');
        ctx.save();
        ctx.scale(1, rY / rX);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(l.x, l.y * (rX / rY), rX, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        l.x += l.speedX;
        l.y += l.speedY;
        if (l.x - l.rX > W * 1.1)   l.x = -l.rX;
        if (l.y < H * 0.2)           l.y = H * 0.9;
        if (l.y > H * 1.1)           l.y = H * 0.3;
      }
    }

    // ── ASH / DUST PARTICLES ─────────────────────────────────────────
    let particles = null;
    function initParticles(W, H) {
      particles = Array.from({length: 55}, () => ({
        x:      Math.random() * W,
        y:      H + Math.random() * H * 0.4,
        size:   0.5 + Math.random() * 1.8,
        speedY: -(0.12 + Math.random() * 0.45),
        speedX: (Math.random() - 0.5) * 0.22,
        alpha:  0.0,
        maxAlpha: 0.25 + Math.random() * 0.45,
        fadeIn:  0.004 + Math.random() * 0.006,
        fadeOut: 0.002 + Math.random() * 0.004,
        state:  'fadein',  // fadein | alive | fadeout
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.01 + Math.random() * 0.02,
        wobbleAmp: 0.3 + Math.random() * 0.7,
      }));
    }

    function drawParticles(pCanvas, W, H) {
      const ctx = pCanvas.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        // Movement
        p.wobble += p.wobbleSpeed;
        p.x += p.speedX + Math.sin(p.wobble) * p.wobbleAmp * 0.04;
        p.y += p.speedY;

        // Alpha lifecycle
        if (p.state === 'fadein') {
          p.alpha += p.fadeIn;
          if (p.alpha >= p.maxAlpha) { p.alpha = p.maxAlpha; p.state = 'alive'; }
        } else if (p.state === 'alive') {
          if (p.y < H * 0.15) p.state = 'fadeout';
        } else {
          p.alpha -= p.fadeOut;
          if (p.alpha <= 0) {
            // Respawn at bottom
            p.x = Math.random() * W;
            p.y = H + Math.random() * 30;
            p.alpha = 0;
            p.state = 'fadein';
            p.speedY = -(0.12 + Math.random() * 0.45);
            p.speedX = (Math.random() - 0.5) * 0.22;
            p.size = 0.5 + Math.random() * 1.8;
            p.maxAlpha = 0.25 + Math.random() * 0.45;
          }
        }

        // Draw
        if (p.alpha <= 0) continue;
        const warm = Math.random() > 0.6; // occasional warm tint
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = warm ? `rgba(255,220,150,1)` : `rgba(230,215,190,1)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // ── INIT ─────────────────────────────────────────────────────────
    function init() {
      const fogCanvas      = document.getElementById('fog-canvas');
      const particleCanvas = document.getElementById('particle-canvas');
      if (!fogCanvas || !particleCanvas) return;

      function resize() {
        const W = fogCanvas.offsetWidth  || 400;
        const H = fogCanvas.offsetHeight || 700;
        fogCanvas.width       = W;  fogCanvas.height       = H;
        particleCanvas.width  = W;  particleCanvas.height  = H;
        initFogLayers(W, H);
        initParticles(W, H);
      }
      resize();
      window.addEventListener('resize', resize);

      function loop() {
        const W = fogCanvas.width, H = fogCanvas.height;
        drawFog(fogCanvas, W, H);
        drawParticles(particleCanvas, W, H);
        requestAnimationFrame(loop);
      }
      loop();
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  })();
  </script>

const STAT_WHEELS = new Set(['STR', 'IQ', 'Speed', 'Dura']);

function getSegmentColor(entry, wheelID, segIndex, totalSegs) {
  if (STAT_WHEELS.has(wheelID)) {
    const palette = STAT_WHEEL_COLORS[wheelID];
    const tier = entry.tier;
    const key = (tier === 'None') ? 'Trash' : (palette[tier] ? tier : 'Common');
    return palette[key] || palette.Common;
  }

  if (wheelID === 'Race' || wheelID === 'Subrace') {
    return RACE_COLORS[entry.tier] || RACE_COLORS.Common;
  }
  if (wheelID === 'Profession') {
    return PROFESSION_COLORS[entry.tier] || PROFESSION_COLORS.Common;
  }
  if (wheelID === 'Companion') {
    return COMPANION_COLORS[entry.tier] || COMPANION_COLORS.Common;
  }

  // BlessingCurse: blessings = gold/yellow, curses = dark red, nothing = neutral
  if (wheelID === 'BlessingCurse') {
    const name = (entry.displayName || '').toLowerCase();
    const isBlessing = name.includes('blessing') || name.includes('grace') || name.includes('favor') || name.includes('divine') || name.includes("rat king");
    const isCurse    = name.includes('curse') || name.includes('jinx') || name.includes('hex') || name.includes('pact') || name.includes('vampire') || name.includes('oathbreaker') || name.includes('void') || name.includes('abyss') || name.includes('blood') || name.includes('bone') || name.includes('shadow') || name.includes('doom') || name.includes('plague') || name.includes('dark');
    if (isBlessing) {
      const blessTiers = {
        None:      { bg: '#5c4a00', text: '#f5e080' },
        Trash:     { bg: '#7a6200', text: '#f5e080' },
        Common:    { bg: '#a88800', text: '#fff8cc' },
        Uncommon:  { bg: '#c8a800', text: '#fff8cc' },
        Rare:      { bg: '#d4a820', text: '#fffbe8' },
        Epic:      { bg: '#e8c840', text: '#1a1000' },
        Legendary: { bg: '#f5e080', text: '#1a1000' },
        OP:        { bg: '#fffbe8', text: '#1a0800' },
      };
      const t = segIndex !== undefined && totalSegs > 1 ? (segIndex / (totalSegs - 1)) : 0.5;
      const shift = (0.5 - t) * 18;
      const base = blessTiers[entry.tier] || blessTiers.Common;
      return { bg: hexShiftL(base.bg, shift), text: base.text };
    }
    if (isCurse) {
      const curseTiers = {
        None:      { bg: '#1a0000', text: '#cc4444' },
        Trash:     { bg: '#2a0000', text: '#dd6666' },
        Common:    { bg: '#5a0000', text: '#ffaaaa' },
        Uncommon:  { bg: '#780000', text: '#ffbbbb' },
        Rare:      { bg: '#9a0000', text: '#ffcccc' },
        Epic:      { bg: '#c01010', text: '#fff0f0' },
        Legendary: { bg: '#cc2222', text: '#fff0f0' },
        OP:        { bg: '#ff2200', text: '#fff0f0' },
      };
      const t = segIndex !== undefined && totalSegs > 1 ? (segIndex / (totalSegs - 1)) : 0.5;
      const shift = (0.5 - t) * 16;
      const base = curseTiers[entry.tier] || curseTiers.Common;
      return { bg: hexShiftL(base.bg, shift), text: base.text };
    }
    // Nothing / neutral
    return { bg: '#2a2a3a', text: '#9999aa' };
  }

  const tc = TIER_COLORS[entry.tier] || TIER_COLORS.Common;

  // Add subtle brightness variation across segments for a gradient feel
  if (segIndex !== undefined && totalSegs !== undefined && totalSegs > 1) {
    const t = segIndex / (totalSegs - 1);
    const shift = (0.5 - t) * 22;
    const bg = hexShiftL(tc.bg, shift);
    return { bg, text: tc.text };
  }
  return tc;
}

// Shift hex color lightness by amount (positive = lighter, negative = darker)
function hexShiftL(hex, amount) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const clamp = v => Math.max(0, Math.min(255, Math.round(v + amount)));
  return '#' + [clamp(r), clamp(g), clamp(b)].map(v => v.toString(16).padStart(2,'0')).join('');
}

// ── WEIGHTED RANDOM ───────────────────────────────────────────────
function weightedRandom(entries) {
  const total = entries.reduce((s, e) => s + e.baseWeight, 0);
  let r = Math.random() * total;
  for (const e of entries) {
    r -= e.baseWeight;
    if (r <= 0) return e;
  }
  return entries[entries.length - 1];
}

function renderEffectPreview(wheelID) {
  const el = document.getElementById('effect-preview');
  if (!el) return;

  const activeEffects = getActiveEffectsForWheel(wheelID).filter(e => e !== 'EmptyMagnet');
  const hints = COMBO_HINTS.filter(h => h.wheel === wheelID && h.check());

  if (activeEffects.length === 0 && hints.length === 0) {
    el.style.display = 'none';
    return;
  }

  let html = '';

  if (activeEffects.length > 0) {
    const rows = activeEffects.map(eff => {
      const p = EFFECT_PREVIEWS[eff]; if (!p) return '';
      return `<span style="color:rgba(200,165,60,0.9);font-weight:800;">${p.source}:</span> <span style="color:#eee;font-weight:700;">${p.name}</span> <span style="color:#666;">· ${p.text}</span>`;
    }).filter(Boolean).join('<br>');
    html += `<div style="background:rgba(10,12,28,0.93);border:1px solid #2a4a8a;border-radius:10px;padding:5px 10px;font-size:10px;line-height:1.5;"><span style="font-size:8px;font-weight:800;letter-spacing:1.2px;color:#4488cc;text-transform:uppercase;">⚡ Active Effect</span><br>${rows}</div>`;
  }

  hints.forEach(h => {
    html += `<div style="background:rgba(10,20,10,0.92);border:1px solid #2a5a1a;border-radius:10px;padding:5px 10px;font-size:10px;line-height:1.5;"><span style="font-size:8px;font-weight:800;letter-spacing:1.2px;color:#66aa33;text-transform:uppercase;">✨ Combo Hint</span><br><span style="color:#bbff88;font-weight:800;">${h.name}</span> <span style="color:#666;">· ${h.text}</span></div>`;
  });

  el.innerHTML = html;
  el.style.display = 'flex';
}

      case 'GuaranteedSlotWeapon': return W === 'Weapon';
      case 'GuaranteedCompanion':  return W === 'Companion';
      case 'NoTrashArmor':         return W === 'Armor';
      case 'BetterEnchantments':   return W === 'Enchantment';

      case 'TrashMagnet':          return ['Companion','Weapon','Enchantment','Armor','Power','BlessingCurse'].includes(W);

function nameHas(entry, keywords) {
  const n = String(entry.displayName || '').toLowerCase();
  return keywords.some(k => n.includes(String(k).toLowerCase()));
}

function isEmptyEntry(entry) {
  return ['Nothing','No Weapon','No Armor','No Power'].includes(entry.displayName);
}

function isEmptyResultForWheel(entry, wheelID) {
  if (wheelID === 'Companion' && entry.displayName === 'Nothing')   return true;
  if (wheelID === 'Weapon'    && entry.displayName === 'No Weapon') return true;
  if (wheelID === 'Armor'     && entry.displayName === 'No Armor')  return true;
  if (wheelID === 'Power'     && entry.displayName === 'No Power')  return true;
  return false;
}

  return nameHas(entry, ['Blessing','Favor','Approval','Heart','Spark','Chosen','Sacred','Grace','Lucky','Perfect','Crown']);

}

  const rareUp = ['Rare','Epic','Legendary','OP'];

  function notDone(comboName) {
    return !triggeredCombos.some(c => c.name === comboName);
  }

  // 1. Goblin Payday
  if (race === 'Goblin' && wheelID === 'Companion' && name === 'Treasure Goblin' && notDone('Goblin Payday'))
    w *= 14.0;

  // 2. Dragon Legacy
  if (race === 'Dragonborn' && wheelID === 'Weapon' && name.includes('Dragon') && notDone('Dragon Legacy'))
    w *= 9.0;

  // 3. Holy Arsenal
  if (race === 'Angel' && wheelID === 'Weapon' && (name.includes('Excalibur') || name.includes('Sun') || name.includes('Holy')) && notDone('Holy Arsenal'))
    w *= 9.0;

  // 4. Infernal Weapon
  if (race === 'Demon' && wheelID === 'Weapon' && (name.includes('Black') || name.includes('Demonic') || name.includes('Infernal')) && notDone('Infernal Weapon'))
    w *= 9.0;

  // 5. Blacksmith Masterwork
  if (prof === 'Blacksmith' && wheelID === 'Weapon' && (entry.slots || 0) >= 2 && notDone('Blacksmith Masterwork'))
    w *= 7.0;

  // 6. Tamer Bond
  if (prof === 'Tamer' && wheelID === 'Companion' && name !== 'Nothing' && notDone('Tamer Bond'))
    w *= 1.8;

  // 7. Blessed Fate Combo
  if (prof === 'Blessed' && wheelID === 'BlessingCurse' && isBlessingLike(entry) && notDone('Blessed Fate Combo'))
    w *= 7.0;

  // 8. Curse Overload
  if (prof === 'Cursed One' && wheelID === 'BlessingCurse' && isCurseLike(entry) && notDone('Curse Overload'))
    w *= 7.0;

  // 9. Champion Arsenal
  if (prof === 'Champion' && wheelID === 'Weapon' && rareUp.includes(tier) && notDone('Champion Arsenal'))
    w *= 3.2;

  // 10. Berserker Arsenal
  if (prof === 'Berserker' && wheelID === 'Weapon' && nameHas(entry, ['Axe','Sword','Hammer','Katana','Scythe','Blade','Great']) && notDone('Berserker Arsenal'))
    w *= 5.5;

  // 11. Rune Hunter Mark
  if (prof === 'Rune Hunter' && wheelID === 'Enchantment' && rareUp.includes(tier) && notDone('Rune Hunter Mark'))
    w *= 4.5;

  // 12. Beast Bond
  if (prof === 'Beast Whisperer' && wheelID === 'Companion' && name !== 'Nothing' && notDone('Beast Bond'))
    w *= 2.0;

  // 13. Grave Loot
  if (prof === 'Grave Robber' && ['Weapon','Armor','BlessingCurse'].includes(wheelID) &&
      nameHas(entry, ['Bone','Grave','Reaper','Soul','Cursed','Undead','Void','Abyss','Blood','Shadow']) && notDone('Grave Loot'))
    w *= 5.5;

  // 14. Heavy Swing
  if (prof === 'Lumberjack' && wheelID === 'Weapon' && nameHas(entry, ['Axe','Hammer','Great','Club']) && notDone('Heavy Swing'))
    w *= 5.5;

  // 15. Prison Break
  if (prof === 'Prisoner' && wheelID === 'Weapon' && name !== 'No Weapon' && notDone('Prison Break'))
    w *= 2.3;

  // 16. Target Claimed
  if (prof === 'Bounty Hunter' && wheelID === 'Weapon' && rareUp.includes(tier) && notDone('Target Claimed'))
    w *= 3.8;

  // 17. Blood Trail
  if (prof === 'Murderer' && wheelID === 'Weapon' && nameHas(entry, ['Knife','Dagger','Sword','Axe','Blade','Scythe','Blood']) && notDone('Blood Trail'))
    w *= 5.5;

  // 18. Warden's Lock
  if (prof === 'Dungeon Warden' && wheelID === 'Armor' && rareUp.includes(tier) && notDone("Warden's Lock"))
    w *= 3.8;

  // 19. Adaptive Shift
  if (prof === 'Shapeshifter' && wheelID === 'Power' && name !== 'No Power' && notDone('Adaptive Shift'))
    w *= 2.3;

  // 20. OP combos (OnOPHit assist) — not on Race wheel
  if (tier === 'OP' && wheelID !== 'Race') {
    if (prof === 'Underdog'     && notDone('Underdog Miracle'))       w *= 5.0;
    if (race === 'Jinxer'      && notDone('Jinxer Actually Lucky'))   w *= 4.5;
    if (prof === 'Peasant/NPC' && notDone('Peasant Miracle'))         w *= 3.5;
    if (prof === 'Fool'        && notDone("Fool's Miracle"))          w *= 4.0;
    if (prof === 'NPC'         && notDone('Ordinary Hero'))           w *= 3.5;
  }

  return w;
}

function getEffectiveWeight(entry, wheelID) {
  let w = Number(entry.baseWeight || 0);
  const tier = entry.tier || 'Common';
  const rareUp = ['Rare','Epic','Legendary','OP'];

  // ── Race Tier Luck (applied first) ───────────────────────────────
  if (RACE_LUCK_WHEELS.has(wheelID) && genResults['Race']) {
    const raceTier = genResults['Race'].tier || 'None';
    const profile = isStatWheel(wheelID)
      ? getRaceTierLuckProfileForStats(raceTier)
      : getRaceTierLuckProfile(raceTier);
    w *= (profile[tier] ?? 1.0);
  }

  const effects = getActiveEffectsForWheel(wheelID);

  for (const eff of effects) {
    if (eff === 'TrashMagnet') {
      w *= (TIER_MULTIPLIERS.TrashMagnet[tier] ?? 1.0);
    } else if (eff === 'BetterEnchantments') {
      w *= (TIER_MULTIPLIERS.BetterEnchantments[tier] ?? 1.0);
    } else if (eff === 'MagicBoost') {
      w *= (TIER_MULTIPLIERS.MagicBoost_Power[tier] ?? 1.0);
    } else if (eff === 'UnderdogLuck') {
      w *= (TIER_MULTIPLIERS.UnderdogLuck[tier] ?? 1.0);
    } else if (eff === 'BossLuck') {
      w *= (TIER_MULTIPLIERS.BossLuck[tier] ?? 1.0);
    } else if (eff === 'EmptyMagnet') {
      if (isEmptyEntry(entry))        w *= 2.25;
      else if (tier === 'Trash')      w *= 1.25;
      else if (rareUp.includes(tier)) w *= 0.85;
    } else if (eff === 'GamblerChaos') {
      const gm = { None:1.4,Trash:1.35,Common:0.9,Uncommon:0.9,Rare:0.95,Epic:1.15,Legendary:1.35,OP:1.6 };
      w *= (gm[tier] ?? 1.0);
    } else if (eff === 'JokerLuck') {
      const jm = { None:0.75,Trash:0.85,Common:1.0,Uncommon:1.0,Rare:1.15,Epic:1.35,Legendary:1.55,OP:1.75 };
      w *= (jm[tier] ?? 1.0);

    // ── PROFESSION EFFECTS ────────────────────────────────────────
    } else if (eff === 'PeasantLife' || eff === 'NPCBackground') {
      if (isEmptyEntry(entry))                   w *= 1.45;
      if (tier === 'Trash')                      w *= 1.20;
      if (tier === 'Legendary' || tier === 'OP') w *= 0.80;

    } else if (eff === 'TargetLock') {
      if (wheelID === 'Weapon') {
        if (rareUp.includes(tier))                                               w *= 1.25;
        if (nameHas(entry,['Bow','Crossbow','Rifle','Pistol','Dagger','Sword'])) w *= 1.35;
        if (entry.displayName === 'No Weapon')                                   w *= 0.80;
      } else if (wheelID === 'Companion') {
        if (nameHas(entry,['Hound','Falcon','Wolf','Crow']))                     w *= 1.35;
      }

    } else if (eff === 'LoyalService') {
      if (wheelID === 'Armor') {
        if (tier === 'Common' || tier === 'Rare') w *= 1.20;
        if (tier === 'Trash')                     w *= 0.90;
      } else if (wheelID === 'Companion') {
        if (tier === 'Common' || tier === 'Rare') w *= 1.15;
        if (tier === 'Trash')                     w *= 0.90;
      }

    } else if (eff === 'WardenControl') {
      if (wheelID === 'Armor') {
        if (rareUp.includes(tier))                                                          w *= 1.25;
        if (nameHas(entry,['Plate','Chain','Guard','Shield','Bone','Dungeon','Armor']))     w *= 1.40;
      } else if (wheelID === 'Weapon') {
        if (nameHas(entry,['Chain','Hammer','Spear','Axe']))                                w *= 1.30;
      } else if (wheelID === 'Dura') {
        if (rareUp.includes(tier))                                                          w *= 1.20;
      }

    } else if (eff === 'FoolishLuck') {
      if (tier === 'None')      w *= 1.35;
      if (tier === 'Trash')     w *= 1.35;
      if (tier === 'Common')    w *= 0.90;
      if (tier === 'Legendary') w *= 1.15;
      if (tier === 'OP')        w *= 1.25;

    } else if (eff === 'LostFate') {
      if (tier === 'None')      w *= 1.20;
      if (tier === 'Trash')     w *= 1.10;
      if (tier === 'Rare')      w *= 1.05;
      if (tier === 'Epic')      w *= 1.20;
      if (tier === 'Legendary') w *= 1.35;
      if (tier === 'OP')        w *= 1.45;

    } else if (eff === 'AdaptiveBody') {
      if (rareUp.includes(tier)) w *= 1.15;
      if (tier === 'Trash')      w *= 0.90;

    } else if (eff === 'HeavyHands') {
      if (wheelID === 'Weapon') {
        if (nameHas(entry,['Axe','Hammer','Great','Club'])) w *= 1.60;
      } else if (wheelID === 'STR') {
        if (rareUp.includes(tier)) w *= 1.20;
      } else if (wheelID === 'Speed') {
        if (tier === 'Trash' || tier === 'Common')    w *= 1.25;
        if (['Epic','Legendary','OP'].includes(tier)) w *= 0.75;
      }

    } else if (eff === 'ShackledStart') {
      if (wheelID === 'Weapon') {
        if (entry.displayName === 'No Weapon')       w *= 1.40;
      } else if (wheelID === 'Armor') {
        if (entry.displayName === 'No Armor')        w *= 1.25;
        if (tier === 'Common' || tier === 'Rare')    w *= 1.15;
      } else if (wheelID === 'Speed') {
        if (tier === 'Trash')                        w *= 1.35;
      } else if (wheelID === 'Dura') {
        if (tier === 'Common' || tier === 'Rare')    w *= 1.15;
      }

    } else if (eff === 'DrunkenChaos') {
      if (wheelID === 'STR') {
        if (tier === 'Trash' || tier === 'OP') w *= 1.20;
      } else if (wheelID === 'IQ') {
        if (tier === 'Trash') w *= 1.50;
      } else if (wheelID === 'Speed') {
        if (tier === 'Trash') w *= 1.25;
      } else if (wheelID === 'Weapon') {
        if (tier === 'Trash') w *= 1.25;
      } else if (wheelID === 'BlessingCurse') {
        if (isCurseLike(entry)) w *= 1.25;
        if (tier === 'OP')      w *= 1.20;
      }

    } else if (eff === 'Bloodthirst') {
      if (wheelID === 'Weapon') {
        if (nameHas(entry,['Knife','Dagger','Sword','Axe','Blade','Scythe','Blood'])) w *= 1.50;
      } else if (wheelID === 'Power') {
        if (nameHas(entry,['Blood','Shadow','Soul','Demonic']))                        w *= 1.50;
      }

    } else if (eff === 'BlessedFate') {
      if (isBlessingLike(entry))          w *= 1.80;
      else if (isCurseLike(entry))        w *= 0.45;
      else if (isEmptyEntry(entry))       w *= 0.35;
      if (rareUp.includes(tier))          w *= 1.30;

    } else if (eff === 'CurseMagnet') {
      if (wheelID === 'BlessingCurse') {
        if (isCurseLike(entry))           w *= 2.20;
        if (isBlessingLike(entry))        w *= 0.55;
      } else if (wheelID === 'Power') {
        if (nameHas(entry,['Blood','Soul','Void','Necromancy','Demonic','Shadow'])) w *= 1.60;
      }

    } else if (eff === 'RoyalPrivilege') {
      if (wheelID === 'Armor') {
        if (rareUp.includes(tier))                         w *= 1.40;
        if (entry.displayName === 'No Armor')              w *= 0.55;
      } else if (wheelID === 'Weapon') {
        if (rareUp.includes(tier))                         w *= 1.20;
        if (entry.displayName === 'No Weapon')             w *= 0.55;
      } else if (wheelID === 'BlessingCurse') {
        if (isBlessingLike(entry))                         w *= 1.70;
      }

    } else if (eff === 'RuneSense') {
      if (wheelID === 'Enchantment') {
        if (rareUp.includes(tier))                                              w *= 1.50;
        if (nameHas(entry,['Rune','Runed','Magic','Arcane','Origin']))          w *= 1.80;
      } else if (wheelID === 'Power') {
        if (nameHas(entry,['Rune','Origin','Arcane','Reality','Time']))         w *= 1.40;
      }

    } else if (eff === 'BeastBond') {
      if (nameHas(entry,['Wolf','Wyvern','Griffon','Dragon','Kraken','Beetle','Goose','Puppy','Titan','Snail','Shark','Rabbit','Chicken','Ram','Falcon','Hound','Frog','Stag','Crow','Basilisk','Phoenix','Hydra'])) w *= 1.60;
      if (rareUp.includes(tier)) w *= 1.30;

    } else if (eff === 'ReliableMount') {
      if (nameHas(entry,['Wyvern','Griffon','Ram','Falcon','Stag','Horse','Mule'])) w *= 1.60;
      if (rareUp.includes(tier))                                                     w *= 1.20;

    } else if (eff === 'BrutalArsenal') {
      if (wheelID === 'Weapon') {
        if (nameHas(entry,['Axe','Sword','Hammer','Katana','Scythe','Blade','Great','Knuckles'])) w *= 1.60;
        if (nameHas(entry,['Wand','Grimoire','Scepter','Book','Rune']))                           w *= 0.75;
      } else if (wheelID === 'Power') {
        if (nameHas(entry,['Fire','Demonic','Dragon','One Punch','Surge','Blood','Storm']))       w *= 1.40;
      }

    } else if (eff === 'DefensiveStance') {
      if (wheelID === 'Armor' && rareUp.includes(tier)) w *= 1.40;
      if (wheelID === 'Dura'  && rareUp.includes(tier)) w *= 1.30;

    } else if (eff === 'PrecisionGear') {
      if (wheelID === 'Weapon') {
        if (nameHas(entry,['Bow','Crossbow','Rifle','Pistol','Harpoon','Throw','Shuriken'])) w *= 1.70;
      } else if (wheelID === 'Companion') {
        if (nameHas(entry,['Falcon','Wolf','Crow','Hound','Stag','Rabbit']))                 w *= 1.40;
      } else if (wheelID === 'Speed') {
        if (rareUp.includes(tier))                                                           w *= 1.25;
      }

    } else if (eff === 'ChampionGear') {
      if (rareUp.includes(tier)) w *= 1.40;

    } else if (eff === 'Witchcraft') {
      if (wheelID === 'Power') {
        if (nameHas(entry,['Magic','Shadow','Soul','Blood','Void','Necromancy','Dream','Moon'])) w *= 1.50;
        if (entry.displayName === 'No Power')                                                    w *= 0.55;
      } else if (wheelID === 'BlessingCurse') {
        if (isCurseLike(entry))    w *= 1.50;
        if (isBlessingLike(entry)) w *= 1.20;
      }

    } else if (eff === 'LootSense') {
      if (wheelID === 'Weapon') {
        if (nameHas(entry,['Dagger','Knife','Bow','Crossbow','Pistol','Shuriken','Whip'])) w *= 1.50;
        if (rareUp.includes(tier))                                                          w *= 1.25;
      } else if (wheelID === 'Enchantment') {
        if (rareUp.includes(tier)) w *= 1.25;
      }

    } else if (eff === 'GraveLoot') {
      if (nameHas(entry,['Bone','Grave','Reaper','Soul','Cursed','Undead','Void','Abyss','Blood','Shadow'])) w *= 1.70;
    }
    // EliteGuarantee: filtering only in getEntriesForWheel
  }

  // ── Small global empty-result nudge (applied after profession effects) ──
  if (isEmptyResultForWheel(entry, wheelID)) {
    w *= 1.18;
  }

  // ── Combo Assist (applied last) ──────────────────────────────────
  w = applyComboAssistWeight(entry, wheelID, w);

  return Math.max(0.05, w);
}

// ── COMBO SYSTEM ──────────────────────────────────────────────────

let lastComboPanel = ''; // shown in reward panel

function applyCombo(name, delta) {
  if (triggeredCombos.find(c => c.name === name)) return; // no double-trigger
  triggeredCombos.push({ name, delta });
  STAT_KEYS.forEach(k => { genStats[k] += Number(delta[k] || 0); });
  // Build combo display text
  const parts = STAT_KEYS.filter(k => delta[k]).map(k => {
    const v = delta[k];
    return `<span class="${v > 0 ? 'rp-pos' : 'rp-neg'}">${k} ${v > 0 ? '+' : ''}${v}</span>`;
  });
  lastComboPanel = `<span class="rp-name" style="color:#f0c040;font-size:13px;">✨ COMBO: ${name}!</span><span class="rp-stats">${parts.join('<span class="rp-neu"> · </span>')}</span>`;
}

function checkAndApplyCombos(triggerType, lastEntry) {
  const r = genResults;
  const race = r.Race?.displayName || '';
  const prof = r.Profession?.displayName || '';

  // OnOPHit — checked every spin
  if (triggerType === 'OnOPHit' && lastEntry?.tier === 'OP') {
    if (prof === 'Underdog')    applyCombo('Underdog Miracle', {STR:2,IQ:2,SPD:2,DUR:2,PM:2,DEF:2});
    if (race === 'Jinxer')      applyCombo('Jinxer Actually Lucky', {STR:1,IQ:1,SPD:1,DUR:1,PM:3,DEF:1});
    if (prof === 'Peasant/NPC') applyCombo('Peasant Miracle', {IQ:1,PM:1});
    if (prof === 'Fool')        applyCombo("Fool's Miracle", {SPD:2,PM:2});
    if (prof === 'NPC')         applyCombo('Ordinary Hero', {DEF:1,PM:1});
  }

  if (triggerType === 'AfterProfession') {
    if (prof === 'Exorcist' && race === 'Undead')
      applyCombo('Exorcist Undead Specialist', {IQ:2,PM:2,DEF:1});
    if (prof === 'Toymaker' && race === 'Clockwork Doll')
      applyCombo("Toymaker's Creation", {IQ:2,PM:2,DEF:1});
  }

  if (triggerType === 'AfterCompanion') {
    const comp = r.Companion?.displayName || '';
    if (race === 'Goblin' && comp === 'Treasure Goblin')
      applyCombo('Goblin Payday', {IQ:2,SPD:1});
    if (prof === 'Tamer' && comp !== 'Nothing')
      applyCombo('Tamer Bond', {SPD:1,PM:1});
    if (prof === 'Battle Bard' && comp !== 'Nothing')
      applyCombo('Battle Bard Performance', {IQ:1,SPD:1,PM:1});
    if (prof === 'Beast Whisperer' && comp !== 'Nothing')
      applyCombo('Beast Bond', {SPD:1,PM:1});
  }

  if (triggerType === 'AfterWeapon') {
    const wpn = r.Weapon?.displayName || '';
    const slots = r.Weapon?.slots || 0;
    if (race === 'Dragonborn' && wpn.includes('Dragon'))
      applyCombo('Dragon Legacy', {STR:2,PM:2});
    if (race === 'Angel' && (wpn.includes('Excalibur') || wpn.includes('Sun') || wpn.includes('Holy')))
      applyCombo('Holy Arsenal', {IQ:1,DUR:1,PM:1,DEF:2});
    if (race === 'Demon' && (wpn.includes('Black') || wpn.includes('Demonic') || wpn.includes('Infernal')))
      applyCombo('Infernal Weapon', {STR:2,PM:2,DEF:-1});
    if (prof === 'Blacksmith' && slots >= 2)
      applyCombo('Blacksmith Masterwork', {STR:2,DEF:1});
    if ((prof === 'Chef' || prof === 'Storm Chef') && (wpn.includes('Pan') || wpn.includes('Knife') || wpn.includes('Fork')))
      applyCombo('Chef Special', {STR:2,IQ:1});
    if (prof === 'Champion' && ['Rare','Epic','Legendary','OP'].includes(r.Weapon?.tier))
      applyCombo('Champion Arsenal', {STR:1,DEF:1});
    if (prof === 'Berserker' && nameHas(r.Weapon, ['Axe','Sword','Hammer','Katana','Scythe','Blade','Great']))
      applyCombo('Berserker Arsenal', {STR:2,DEF:-1});
    if (prof === 'Lumberjack' && nameHas(r.Weapon, ['Axe','Hammer','Great','Club']))
      applyCombo('Heavy Swing', {STR:2});
    if (prof === 'Prisoner' && wpn !== 'No Weapon')
      applyCombo('Prison Break', {SPD:1,STR:1});
    if (prof === 'Bounty Hunter' && ['Rare','Epic','Legendary','OP'].includes(r.Weapon?.tier))
      applyCombo('Target Claimed', {SPD:1,STR:1});
    if (prof === 'Murderer' && nameHas(r.Weapon, ['Knife','Dagger','Sword','Axe','Blade','Scythe','Blood']))
      applyCombo('Blood Trail', {STR:2,PM:1});
  }

  if (triggerType === 'AfterEnchantment') {
    const enchTier = lastEntry?.tier || '';
    if (prof === 'Rune Hunter' && ['Rare','Epic','Legendary','OP'].includes(enchTier))
      applyCombo('Rune Hunter Mark', {IQ:1,PM:1});
  }

  if (triggerType === 'AfterArmor') {
    const arm = r.Armor?.displayName || '';
    const armorParent = r.Armor?.parentResult || '';
    const wpnParent = r.Weapon?.parentResult || '';
    if (race === 'Mechanoid' && armorParent === 'Mechanoid' && wpnParent === 'Mechanoid')
      applyCombo('Machine Complete', {PM:2,DEF:3});
    if (race === 'Crystalborn' && arm.includes('Crystal'))
      applyCombo('Crystal Fortress', {DUR:2,DEF:3});
    const pwr = r.Power?.displayName || '';
    if (pwr.includes('Moon') && arm.includes('Moon'))
      applyCombo('Moon Set', {SPD:2,PM:2});
    if (pwr.includes('Sun') && arm.includes('Sun'))
      applyCombo('Sun Set', {STR:2,PM:1,DEF:2});
    if (prof === 'Dungeon Warden' && ['Rare','Epic','Legendary','OP'].includes(r.Armor?.tier))
      applyCombo("Warden's Lock", {DEF:2});
    if (prof === 'Grave Robber' && nameHas(r.Armor, ['Bone','Grave','Reaper','Soul','Cursed','Undead','Void','Abyss','Blood','Shadow']))
      applyCombo('Grave Loot', {PM:2});
  }

  if (triggerType === 'AfterPower') {
    const pwr = r.Power?.displayName || '';
    if (prof === 'Mage' && pwr !== 'No Power')
      applyCombo('Mage Awakening', {IQ:1,PM:2});
    if (prof === 'Final Boss' && r.Power && ['Legendary','OP'].includes(r.Power.tier))
      applyCombo('Final Boss Completed', {PM:3,DEF:2});
    if (prof === 'Storm Chef' && pwr === 'Storm Kitchen')
      applyCombo('Storm Kitchen Online', {STR:2,IQ:2,PM:2});
    if (prof === 'Mimic Trainer') {
      const wpn = r.Weapon?.displayName || '';
      if (wpn === 'Mimic Chest' && pwr === 'Mimic Body')
        applyCombo('Mimic Master', {STR:2,IQ:2,SPD:2,DUR:2,PM:2});
    }
    if (prof === 'Shapeshifter' && pwr !== 'No Power')
      applyCombo('Adaptive Shift', {SPD:1,DUR:1});
  }

  if (triggerType === 'AfterBlessingCurse') {
    const bc  = r.BlessingCurse?.displayName || '';
    const pwr = r.Power?.displayName || '';
    if (race === 'Ratfolk' && bc === "Rat King's Favor")
      applyCombo('Rat King Combo', {IQ:2,SPD:2});
    if (race === 'Djinn' && pwr.includes('Wish') && !bc.includes('Wish Debt'))
      applyCombo('Wish Gone Right', {IQ:3,PM:3});
    if (race === 'Djinn' && bc === 'Wish Debt')
      applyCombo('Wish Gone Wrong', {PM:5,DUR:-2,DEF:-2});
    if (prof === 'Mimic Trainer' && bc === 'Mimic Curse')
      applyCombo('Mimic Disaster', {PM:2,IQ:-1});
    if (prof === 'Oathbreaker' && (bc.includes('Curse') || bc.includes('Pact') || bc.includes('Abyss')))
      applyCombo('Oathbreaker Darkness', {STR:2,PM:3,DEF:-1});
    if (prof === 'Monster Lawyer' && (bc.includes('Curse') || bc.includes('Debt') || bc.includes('Tax')))
      applyCombo('Legal Loophole', {IQ:2});
    if (prof === 'Blessed' && isBlessingLike(r.BlessingCurse))
      applyCombo('Blessed Fate Combo', {PM:2,DEF:1});
    if (prof === 'Cursed One' && isCurseLike(r.BlessingCurse))
      applyCombo('Curse Overload', {PM:3,DUR:-1});
    if (prof === 'Grave Robber' && nameHas(r.BlessingCurse, ['Bone','Grave','Reaper','Soul','Cursed','Undead','Void','Abyss','Blood','Shadow']))
      applyCombo('Grave Loot', {PM:2});
  }
}

function getEntriesForWheel(wheelID, parentResult) {
  const selectedRace = genResults['Race'] ? genResults['Race'].displayName : null;
  const effects = getActiveEffectsForWheel(wheelID);

  let entries;
  if (wheelID === 'Subrace') {
    entries = WHEEL_ENTRIES.filter(e =>
      e.wheelID === 'Subrace' &&
      e.parentWheel === 'Race' &&
      e.parentResult === selectedRace &&
      e.displayName !== 'No Subrace'
    );
  } else {
    entries = WHEEL_ENTRIES.filter(e => {
      if (e.wheelID !== wheelID) return false;
      if (e.displayName === 'No Subrace') return false;
      if (e.parentWheel === 'Any') return true;
      if (e.parentWheel === 'Race') return selectedRace === e.parentResult;
      return e.parentResult === parentResult;
    });
  }

  if (effects.includes('GuaranteedSlotWeapon')) {
    entries = entries.filter(e => e.displayName !== 'No Weapon' && (e.slots || 0) >= 1);
  }
  if (effects.includes('GuaranteedCompanion') || effects.includes('BeastBond') || effects.includes('ReliableMount')) {
    entries = entries.filter(e => e.displayName !== 'Nothing');
  }
  if (effects.includes('NoTrashArmor')) {
    entries = entries.filter(e => e.tier !== 'Trash');
  }
  if (effects.includes('DefensiveStance') && wheelID === 'Armor') {
    entries = entries.filter(e => e.displayName !== 'No Armor');
  }
  if (effects.includes('ChampionGear')) {
    if (wheelID === 'Weapon') entries = entries.filter(e => e.displayName !== 'No Weapon');
    if (wheelID === 'Armor')  entries = entries.filter(e => e.displayName !== 'No Armor');
  }
  if (effects.includes('EliteGuarantee')) {
    if (wheelID === 'Companion') entries = entries.filter(e => e.displayName !== 'Nothing');
    if (wheelID === 'Weapon')    entries = entries.filter(e => e.displayName !== 'No Weapon');
    if (wheelID === 'Armor')     entries = entries.filter(e => e.displayName !== 'No Armor');
    if (wheelID === 'Power')     entries = entries.filter(e => e.displayName !== 'No Power');
  }

  return entries;
}

function buildSegmentsFromEntries(entries) {
  return entries.map(e => {
    const tc = TIER_COLORS[e.tier] || TIER_COLORS.Common;
    return { label: e.displayName, color: tc.bg, textColor: tc.text, entry: e };
  });
}

// ── GENERATOR FLOW ────────────────────────────────────────────────
function startGenerator() {
  genStep    = 0;
  genResults = {};
  genStats   = { STR: 0, IQ: 0, SPD: 0, DUR: 0, PM: 0, DEF: 0 };
  enchantmentsRolled = [];
  enchantmentSlotsLeft = 0;
  triggeredCombos = [];
  generatorActive = true;
  currentChampionSaved = false;
  loadNextWheel();
}

function loadNextWheel() {
  const rewardPanel = document.getElementById('reward-panel');
  if (rewardPanel) rewardPanel.style.display = 'none';
  const flashBox = document.getElementById('spin-effect-flash');
  if (flashBox) flashBox.style.display = 'none';
  const effectCard = document.getElementById('effect-card-flash');
  if (effectCard) effectCard.style.display = 'none';
  clearTimeout(window.effectFlashTimeout);
  clearTimeout(window.professionEffectTimeout);

  if (genStep >= WHEEL_ORDER.length) {
    showEndCard();
    return;
  }
  const wheelID = WHEEL_ORDER[genStep];
  const parentResult = genResults['Race'] ? genResults['Race'].displayName : null;

  // ── Enchantment special logic ──────────────────────────────────
  if (wheelID === 'Enchantment') {
    const weapon = genResults['Weapon'];
    const slots = weapon ? (weapon.slots || 0) : 0;

    // First time hitting Enchantment: set how many spins needed
    if (enchantmentSlotsLeft === 0) {
      if (!weapon || weapon.displayName === 'No Weapon' || slots === 0) {
        // Skip enchantment entirely
        genStep++;
        loadNextWheel();
        return;
      }
      enchantmentSlotsLeft = slots;
    }
    // If we still have spins left, show enchantment wheel (don't advance genStep)
  }

  const entries = getEntriesForWheel(wheelID, parentResult);

  // If no entries (e.g. Race has no real Subraces), skip silently
  if (entries.length === 0) {
    if (wheelID === 'Subrace') genResults['Subrace'] = null;
    genStep++;
    loadNextWheel();
    return;
  }

  // Update title card + icon
  document.getElementById('title-card').textContent = (wheelID === 'BlessingCurse') ? 'Blessing / Curse' : wheelID;
  const _rt = document.getElementById('result-text'); _rt.textContent = '???'; _rt.removeAttribute('textLength'); _rt.removeAttribute('lengthAdjust'); _rt.setAttribute('font-size','38'); _rt.setAttribute('letter-spacing','3');
  updateWheelIcon(wheelID);
  renderEffectPreview(wheelID);

  // Build weighted segment layout
  segLayout = buildSegments(entries, wheelID);
  currentRotation = 0;
  drawWheel(currentRotation);
}

function recordResult(winnerIdx) {
  const wheelID = WHEEL_ORDER[genStep];
  const seg = segLayout[winnerIdx];
  const entry = seg ? seg.entry : segLayout[0].entry;
  lastComboPanel = ''; // reset combo display

  if (wheelID === 'Enchantment') {
    enchantmentsRolled.push(entry);
    genResults['Enchantment'] = entry; // track last enchantment for combo checks
    genStats.STR += entry.STR || 0;
    genStats.IQ  += entry.IQ  || 0;
    genStats.SPD += entry.SPD || 0;
    genStats.DUR += entry.DUR || 0;
    genStats.PM  += entry.PM  || 0;
    genStats.DEF += entry.DEF || 0;
    checkAndApplyCombos('OnOPHit', entry);
    checkAndApplyCombos('AfterEnchantment', entry);
    enchantmentSlotsLeft--;
    if (enchantmentSlotsLeft > 0) return;
    genStep++;
    return;
  }

  genResults[wheelID] = entry;

  if (wheelID === 'Profession') {
    showProfessionEffectCard(entry);
  }

  if (wheelID === 'Weapon') {
    enchantmentSlotsLeft = 0;
  }

  genStats.STR += entry.STR || 0;
  genStats.IQ  += entry.IQ  || 0;
  genStats.SPD += entry.SPD || 0;
  genStats.DUR += entry.DUR || 0;
  genStats.PM  += entry.PM  || 0;
  genStats.DEF += entry.DEF || 0;

  // Check combos for this wheel
  checkAndApplyCombos('OnOPHit', entry);
  const triggerMap = {
    Profession: 'AfterProfession',
    Companion:  'AfterCompanion',
    Weapon:     'AfterWeapon',
    Armor:      'AfterArmor',
    Power:      'AfterPower',
    BlessingCurse: 'AfterBlessingCurse',
  };
  if (triggerMap[wheelID]) checkAndApplyCombos(triggerMap[wheelID], entry);

  genStep++;
}

function saveChampionToSeason() {
  if (currentChampionSaved) {
    const msg = document.getElementById('save-champion-msg');
    if (msg) { msg.textContent = 'Already saved.'; msg.style.color = '#f0c040'; }
    return;
  }
  const champions = getSavedChampions();
  const data = buildChampionSaveData();
  champions.push(data);
  try {
    localStorage.setItem(SEASON_STORAGE_KEY, JSON.stringify(champions));
    currentChampionSaved = true;
    updateSavedChampionCount();
    const msg = document.getElementById('save-champion-msg');
    if (msg) { msg.textContent = `Saved as Champion #${data.slot}!`; msg.style.color = '#66ee88'; }
    const btn = document.getElementById('save-champion-btn');
    if (btn) { btn.style.opacity = '0.5'; btn.style.cursor = 'default'; }
  } catch (e) {
    const msg = document.getElementById('save-champion-msg');
    if (msg) { msg.textContent = 'Save failed.'; msg.style.color = '#ff5544'; }
  }
}

function exportSeasonJSON() {
  const champions = getSavedChampions();
  const payload = {
    season: 1,
    totalChampions: champions.length,
    exportedAt: new Date().toISOString(),
    champions,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wheel_of_origin_season_1_champions.json';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
}

function clearSavedSeason() {
  if (!confirm('Clear all saved champions? This cannot be undone.')) return;
  localStorage.removeItem(SEASON_STORAGE_KEY);
  currentChampionSaved = false;
  updateSavedChampionCount();
  const msg = document.getElementById('save-champion-msg');
  if (msg) { msg.textContent = 'Season cleared.'; msg.style.color = '#aaa'; }
  const btn = document.getElementById('save-champion-btn');
  if (btn) { btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
}

function updateSavedChampionCount() {
  const count = getSavedChampions().length;
  const el = document.getElementById('saved-champion-count');
  if (el) el.textContent = `Saved Champions: ${count} / 128`;
}

function getDisplayLabel(entry) {
  const statWheels = ['STR', 'IQ', 'Speed', 'Dura'];
  if (statWheels.includes(entry.wheelID)) {
    // Return just the number: "STR 7" → "7", "Speed 10" → "10"
    const match = (entry.displayName || '').match(/\d+/);
    return match ? match[0] : entry.displayName;
  }
  return entry.displayName;
}



const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
const resultText = document.getElementById('result-text');

function fitResultText() {
  const el = resultText;
  const svg = document.getElementById('result-text-svg');
  if (!el || !svg) return;

  const text = el.textContent;

  // Reset
  el.setAttribute('letter-spacing', '3');
  el.removeAttribute('textLength');
  el.removeAttribute('lengthAdjust');

  if (!text || text === '???') {
    el.setAttribute('font-size', '38');
    return;
  }

  // Use canvas to measure — works on all devices regardless of font loading
  const canvas = fitResultText._canvas || (fitResultText._canvas = document.createElement('canvas'));
  const ctx = canvas.getContext('2d');

  // Available width = screen width minus padding
  const maxW = window.innerWidth - 48;

  let fs = 38;
  let ls = 3;

  function measureWidth() {
    ctx.font = `900 ${fs}px 'Nunito', sans-serif`;
    let w = 0;
    for (const ch of text) w += ctx.measureText(ch).width;
    w += ls * Math.max(0, text.length - 1);
    return w;
  }

  // Shrink font until it fits
  while (measureWidth() > maxW && fs > 11) {
    fs -= 1;
    ls = Math.max(0, ls - 0.15);
  }

  el.setAttribute('font-size', fs);
  el.setAttribute('letter-spacing', ls.toFixed(2));
}

let currentRotation = 0; // absolute rotation offset applied to wheel
let spinning = false;
let pendingAdvance = false;
let winnerSeg = null; // set when wheel stops, cleared on next spin
let isSpinningRenderMode = false;
let canvasSize = 300;

// Current layout: array of {entry, weight, startAngle, endAngle, centerAngle, color, textColor, label}
let segLayout = [];

function buildSegments(entries, wheelID) {
  const statWheels = ['STR', 'IQ', 'Speed', 'Dura'];
  if (!wheelID) wheelID = entries.length > 0 ? entries[0].wheelID : '';
  const isStatWheel = statWheels.includes(wheelID);

  // Compute effective weights (always use getEffectiveWeight so Race Luck and profession effects apply to stat wheels too)
  const withWeights = entries.map(e => ({
    ...e,
    effectiveWeight: getEffectiveWeight(e, wheelID)
  }));

  const TIER_ORDER = { OP:0, Legendary:1, Epic:2, Rare:3, Uncommon:4, Common:5, Trash:6, None:7 };

  let sorted;
  if (isStatWheel) {
    sorted = [...withWeights].sort((a, b) => {
      const numA = parseInt((a.displayName || '').match(/\d+/)?.[0] ?? 0);
      const numB = parseInt((b.displayName || '').match(/\d+/)?.[0] ?? 0);
      return numB - numA;
    });
  } else {
    // Sort by tier (rarest first = smallest segment), then by effectiveWeight
    sorted = [...withWeights].sort((a, b) => {
      const ta = TIER_ORDER[a.tier] ?? 5;
      const tb = TIER_ORDER[b.tier] ?? 5;
      if (ta !== tb) return ta - tb; // OP first, None last
      return a.effectiveWeight - b.effectiveWeight;
    });
  }

  const total = sorted.reduce((s, e) => s + e.effectiveWeight, 0);
  const layout = [];
  let cumAngle = 0;
  for (let i = 0; i < sorted.length; i++) {
    const e = sorted[i];
    const tc = getSegmentColor(e, wheelID, i, sorted.length);
    const span = (e.effectiveWeight / total) * 2 * Math.PI;
    layout.push({
      entry:       e,
      weight:      e.effectiveWeight,
      startAngle:  cumAngle,
      endAngle:    cumAngle + span,
      centerAngle: cumAngle + span / 2,
      color:       tc.bg,
      textColor:   tc.text,
      label:       getDisplayLabel(e),
    });
    cumAngle += span;
  }
  return layout;
}

function weightedPickSegment(layout) {
  const total = layout.reduce((s, s2) => s + s2.weight, 0);
  let r = Math.random() * total;
  for (const seg of layout) {
    r -= seg.weight;
    if (r <= 0) return seg;
  }
  return layout[layout.length - 1];
}

// Which segment is currently under the top pointer (-PI/2 in wheel-space)
function getSegmentAtPointer(layout, rotation) {
  // pointer is at angle -PI/2 in canvas space.
  // A segment painted at startAngle..endAngle (in wheel-local space)
  // appears at (startAngle + rotation) in canvas space.
  // We want: which seg contains (-PI/2 - rotation) mod 2PI in wheel-local space.
  const PI2 = 2 * Math.PI;
  const pointerInWheel = ((-Math.PI / 2 - rotation) % PI2 + PI2) % PI2;
  for (const seg of layout) {
    if (pointerInWheel >= seg.startAngle && pointerInWheel < seg.endAngle) return seg;
  }
  return layout[0];
}

function drawWheel(rotation) {
  const W = canvasSize;
  const cx = W / 2, cy = W / 2;
  const OUTER_R = W / 2 - 2;
  const RING_W  = W * 0.022;
  const R       = OUTER_R - RING_W;

  ctx.clearRect(0, 0, W * (canvas._dpr||1), W * (canvas._dpr||1));
  ctx.save();
  ctx.scale(canvas._dpr || 1, canvas._dpr || 1);
  ctx.translate(cx, cy);

  // Outer ring
  ctx.beginPath();
  ctx.arc(0, 0, OUTER_R, 0, 2 * Math.PI);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, OUTER_R, 0, 2 * Math.PI);
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, R + 1, 0, 2 * Math.PI);
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Identify active segment for highlight
  const activeSeg = spinning ? getSegmentAtPointer(segLayout, rotation) : null;

  // Draw segments
  for (const seg of segLayout) {
    const startA = seg.startAngle + rotation;
    const endA   = seg.endAngle   + rotation;
    const isActive = (seg === activeSeg);

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R, startA, endA);
    ctx.closePath();

    if (isActive) {
      // Brighten active segment slightly while spinning
      ctx.fillStyle = seg.color;
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fill();
    } else {
      ctx.fillStyle = seg.color;
      ctx.fill();
      // Dim non-winner segments after wheel has stopped
      if (!spinning && winnerSeg && seg !== winnerSeg) {
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fill();

    if (spanA < shortThreshold) {
      label = label.replace(/[^A-Za-z0-9]/g, '');
      label = label.slice(0, isDenseLabelWheel ? 3 : 4);
    } else if (spanA < mediumThreshold) {
      label = label.slice(0, isDenseLabelWheel ? 5 : 6);
    }

    let fontSize;
    if (spanA < shortThreshold) {
      fontSize = isDenseLabelWheel ? 6.0 : 6.5;
    } else if (spanA < mediumThreshold) {
      fontSize = isDenseLabelWheel ? 7.0 : 7.5;
    } else {
      fontSize = Math.max(8.0, Math.min(12.5, W * 0.032));
    }

    const isTiny = fontSize <= 6.5;

    ctx.textBaseline = 'middle';
    ctx.textAlign    = 'left';
    ctx.lineJoin     = 'round';
    ctx.miterLimit   = 2;

    const useWhiteText = ['Legendary','OP','Epic','Rare','Trash'].includes(entry.tier) || isTiny || isSmall;
    const fill = useWhiteText ? '#ffffff' : (seg.textColor || '#ffffff');

    const fitted = fitTextToRadialSpace(label, radialSpace - 3, fontSize, isTiny ? 6.0 : 7.0);
    ctx.font = `600 ${fitted.fontSize}px 'Nunito', sans-serif`;
    const tw = ctx.measureText(fitted.text).width;
    const x  = textEndR + Math.max(0, (radialSpace - tw) / 2);

    // ── Clean text rendering: always with subtle shadow ──
    ctx.shadowColor   = 'rgba(0,0,0,0.75)';
    ctx.shadowBlur    = isTiny ? 4 : 3;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0.8;
    ctx.fillStyle = fill;
    ctx.fillText(fitted.text, x, 0);

    ctx.restore();
  }

  // Teardrop pointer
  const hubR2   = W * 0.115;
  const dropTip = -(hubR2 + W * 0.030);
  const dropW   = hubR2 * 0.38;

  ctx.beginPath();
  ctx.moveTo(-dropW / 2, -hubR2 * 0.55);
  ctx.bezierCurveTo(-dropW / 2, -hubR2 * 0.85, -dropW * 0.18, dropTip + 2, 0, dropTip);
  ctx.bezierCurveTo( dropW * 0.18, dropTip + 2,  dropW / 2, -hubR2 * 0.85,  dropW / 2, -hubR2 * 0.55);
  ctx.closePath();
  ctx.fillStyle = '#1e1e1e'; ctx.fill();
  ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 1.5; ctx.stroke();

  // Hub
  ctx.beginPath(); ctx.arc(0, 0, hubR2, 0, 2 * Math.PI);
  ctx.fillStyle = '#1e1e1e'; ctx.fill();
  ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 2; ctx.stroke();

  const innerHubR = hubR2 * 0.6;
  ctx.beginPath(); ctx.arc(0, 0, innerHubR, 0, 2 * Math.PI);
  ctx.fillStyle = '#252525'; ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.restore();
}

function resize() {
  const area = document.getElementById('wheel-area');
  const available = Math.min(area.clientWidth, area.clientHeight) - 20;
  canvasSize = Math.max(260, Math.min(420, available));
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = canvasSize * dpr;
  canvas.height = canvasSize * dpr;
  canvas.style.width  = canvasSize + 'px';
  canvas.style.height = canvasSize + 'px';
  canvas._dpr = dpr;
  drawWheel(currentRotation);
}

// ── SPIN-TO-SEGMENT ────────────────────────────────────────────────
// ── REWARD PANEL ──────────────────────────────────────────────────
const STAT_KEYS = ['STR', 'IQ', 'SPD', 'DUR', 'PM', 'DEF'];

function getEntryStatDelta(entry) {
  return {
    STR: Number(entry.STR || 0),
    IQ:  Number(entry.IQ  || 0),
    SPD: Number(entry.SPD || 0),
    DUR: Number(entry.DUR || 0),
    PM:  Number(entry.PM  || 0),
    DEF: Number(entry.DEF || 0),
  };
}

function renderSpinRewardPanel(entry, wheelID) {
  const spinFlash = document.getElementById('spin-effect-flash');
  if (spinFlash) spinFlash.style.display = 'none';

  const panel = document.getElementById('reward-panel');
  if (!panel) return;

  const delta = getEntryStatDelta(entry);
  const nonZero = STAT_KEYS.filter(k => delta[k] !== 0);

  // Build animated stat chips with staggered delays
  const slots = entry.slots || 0;
  const chipItems = [];

  nonZero.forEach(k => {
    const v = delta[k];
    const cls = v > 0 ? 'rp-pos' : 'rp-neg';
    chipItems.push({ html: `<span class="${cls}">${v > 0 ? '+' : ''}${v} ${k}</span>`, isSec: false });
  });

  if (wheelID === 'Weapon' && slots > 0) {
    chipItems.push({ html: `<span style="color:rgba(200,165,60,0.9);">✦${slots} slot${slots > 1 ? 's' : ''}</span>`, isSep: false });
  }

  // Build statsText with each chip wrapped in an animated container, staggered
  let statsText = '';
  if (chipItems.length > 0) {
    const baseDelay = 60; // ms after panel appears before first chip
    const stepDelay = 80; // ms between each chip
    statsText = chipItems.map((item, i) => {
      const delay = baseDelay + i * stepDelay;
      const sep = (i < chipItems.length - 1)
        ? `<span class="stat-chip-sep rp-neu" style="animation-delay:${delay + 30}ms;color:rgba(180,140,40,0.45);padding:0 2px"> | </span>`
        : '';
      return `<span class="stat-chip" style="animation-delay:${delay}ms">${item.html}</span>${sep}`;
    }).join('');
  }

  const activeEffects = getActiveEffectsForWheel(wheelID).filter(e => e !== 'EmptyMagnet');
  const effectText = activeEffects.length > 0
    ? activeEffects.map(eff => EFFECT_DISPLAY[eff] || eff).join(' · ')
    : '';

  const effectDelay = 60 + chipItems.length * 80 + 40;

  panel.innerHTML = `
    <span class="rp-name">${entry.displayName}</span>
    ${statsText ? `<span class="rp-stats">${statsText}</span>` : ''}
    ${effectText ? `<span class="rp-stats stat-chip" style="color:rgba(200,165,60,0.9);font-size:10px;animation-delay:${effectDelay}ms;">⚡ ${effectText}</span>` : ''}
    ${lastComboPanel}
  `;

  panel.style.display = 'none';
  panel.offsetHeight;
  panel.style.display = 'block';
}


let lastTickSeg = null;
const MAX_VELOCITY = 0.52;

function spinToSegment(targetSeg) {
  // Spin RIGHT (clockwise = positive rotation)
  const PI2 = 2 * Math.PI;

  const minRotation = PI2 * 4;

  const targetCanvas = -Math.PI / 2 - targetSeg.centerAngle;
  let extraTurns = Math.ceil((minRotation - ((targetCanvas - currentRotation) % PI2 + PI2) % PI2) / PI2);
  if (extraTurns < 0) extraTurns = 0;
  const finalRotation = currentRotation + ((targetCanvas - currentRotation) % PI2 + PI2) % PI2 + extraTurns * PI2;

  const totalDist = finalRotation - currentRotation; // always positive

  // Ease-out cubic
  const duration = 3500 + Math.random() * 800; // ms
  const startTime = performance.now();
  const startRotation = currentRotation;

  lastTickSeg = null;
  isSpinningRenderMode = true;
  winnerSeg = null;

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(1, elapsed / duration);
    // ease out cubic
    const ease = 1 - Math.pow(1 - t, 3);
    currentRotation = startRotation + ease * totalDist;

    // Tick sound on segment crossing + live label update
    const curSeg = getSegmentAtPointer(segLayout, currentRotation);
    if (curSeg !== lastTickSeg) {
      lastTickSeg = curSeg;
      const speedFactor = Math.min(1, (1 - ease) / 0.3);
      if (t > 0.01) playSpinTick(speedFactor);
      if (curSeg) { resultText.textContent = getDisplayLabel(curSeg.entry); fitResultText(); }
    }

    drawWheel(currentRotation);

    if (t < 1) {
      spinRaf = requestAnimationFrame(frame);
    } else {
      currentRotation = finalRotation;
      spinning = false;
      isSpinningRenderMode = false;
      winnerSeg = targetSeg;
      drawWheel(currentRotation);
      resultText.textContent = getDisplayLabel(targetSeg.entry);
      setTimeout(() => { fitResultText(); playResultClickBurst(); }, 80);

      if (generatorActive) {
        const idx = segLayout.indexOf(targetSeg);
        const currentWheelID = WHEEL_ORDER[genStep]; // capture before recordResult advances genStep
        recordResult(idx);
        // Show reward panel after stats are applied
        renderSpinRewardPanel(targetSeg.entry, currentWheelID);
        // Wait for user click/tap to advance to next wheel
        pendingAdvance = true;
      }
    }
  }

  spinRaf = requestAnimationFrame(frame);
}

let audioCtx  = null;
let masterGain= null;
let muted     = false;
let spinTickTimers = [];
let _lastTickTime = 0;
const MIN_TICK_INTERVAL = 30; // ms — prevent audio clipping on iOS
let landingBuffer = null;
let landingDecodeStarted = false;

function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = muted ? 0 : MASTER_VOLUME;
  masterGain.connect(audioCtx.destination);
  preloadLandingSample();
}

function base64ToArrayBuffer(base64) {
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

function preloadLandingSample() {
  if (!audioCtx || landingDecodeStarted || landingBuffer) return;
  landingDecodeStarted = true;
  const arrayBuffer = base64ToArrayBuffer(TINY_DECISIONS_LANDING_WAV_BASE64);
  audioCtx.decodeAudioData(arrayBuffer.slice(0))
    .then(buffer => { landingBuffer = buffer; })
    .catch(() => { landingBuffer = null; });
}

function playLandingSample() {
  if (!audioCtx || muted || !landingBuffer) return false;
  const now = audioCtx.currentTime;
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  src.buffer = landingBuffer;
  gain.gain.setValueAtTime(RESULT_SOUND_VOLUME * 1.35, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + landingBuffer.duration + 0.035);
  src.connect(gain);
  gain.connect(masterGain);
  src.start(now);
  return true;
}

function makeNoiseBuffer(seconds = 0.018) {
  const len = Math.max(1, Math.floor(audioCtx.sampleRate * seconds));
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < len; i++) {
    // slightly clicky noise: strong attack, fast fade inside buffer
    const fade = 1 - i / len;
    data[i] = (Math.random() * 2 - 1) * fade;
  }
  return buffer;
}

function envelopeGain(volume, start, decay) {
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(Math.max(0.0001, volume), start);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + decay);
  return gain;
}

function playPlasticTick(intensity = 1, accent = false) {
  if (!audioCtx || muted) return;
  const _now_ms = performance.now();
  if (_now_ms - _lastTickTime < MIN_TICK_INTERVAL) return;
  _lastTickTime = _now_ms;
  const now = audioCtx.currentTime;
  const decay = CLICK_DECAY * (accent ? 1.15 : 1.0) * (0.85 + Math.random() * 0.3);
  const vol = (accent ? RESULT_SOUND_VOLUME : SPIN_TICK_VOLUME) * intensity;

  // 1) Main dry plastic body: filtered noise, very short.
  const bodySrc = audioCtx.createBufferSource();
  bodySrc.buffer = makeNoiseBuffer(accent ? 0.018 : 0.016);

  const bodyFilter = audioCtx.createBiquadFilter();
  bodyFilter.type = 'bandpass';
  bodyFilter.frequency.value = CLICK_BODY_FREQ + Math.random() * 360;
  bodyFilter.Q.value = 3.2;

  const bodyGain = envelopeGain(vol * 0.95, now, decay);
  bodySrc.connect(bodyFilter);
  bodyFilter.connect(bodyGain);
  bodyGain.connect(masterGain);
  bodySrc.start(now);
  bodySrc.stop(now + decay + 0.006);

  // 2) Snap transient: high-passed noise, not oscillator = no digital beep.
  const snapSrc = audioCtx.createBufferSource();
  snapSrc.buffer = makeNoiseBuffer(0.008);

  const snapFilter = audioCtx.createBiquadFilter();
  snapFilter.type = 'highpass';
  snapFilter.frequency.value = CLICK_SNAP_FREQ + Math.random() * 600;
  snapFilter.Q.value = 0.7;

  const snapGain = envelopeGain(vol * (accent ? 0.42 : 0.24), now, decay * 0.55);
  snapSrc.connect(snapFilter);
  snapFilter.connect(snapGain);
  snapGain.connect(masterGain);
  snapSrc.start(now);
  snapSrc.stop(now + decay * 0.7 + 0.003);

  // 3) Small low body only for landing/accent clicks.
  if (accent) {
    const thump = audioCtx.createOscillator();
    const thumpGain = envelopeGain(vol * 0.18, now, 0.028);
    thump.type = 'triangle';
    thump.frequency.setValueAtTime(LANDING_THUMP_FREQ * (0.9 + Math.random() * 0.18), now);
    thump.frequency.exponentialRampToValueAtTime(70, now + 0.032);
    thump.connect(thumpGain);
    thumpGain.connect(masterGain);
    thump.start(now);
    thump.stop(now + 0.038);
  }
}

function playSpinTick(speedFactor = 1) {
  // Fast movement should be audible but not harsh.
  playPlasticTick(0.45 + Math.min(1, speedFactor) * 0.25, false);
}

function playResultClickBurst() {
  if (!audioCtx || muted) return;
  preloadLandingSample();

  // Prefer the real Tiny Decisions-style ending sample embedded above.
  // If the browser has not decoded it yet, use the dry synthetic fallback.
  if (playLandingSample()) {
    return;
  }

  // Fallback: a few quick plastic clicks, then one stronger lock-in click.
  const pattern = [0, 42, 77, 112, 154];
  pattern.forEach((ms, i) => {
    setTimeout(() => {
      const isLast = i === pattern.length - 1;
      playPlasticTick(isLast ? 0.75 : 0.55 + i * 0.04, false);
    }, ms);
  });
}

function scheduleSpinTicks(durationMs) {
  spinTickTimers.forEach(t => clearTimeout(t));
  spinTickTimers = [];

  let t = 0;
  while (t < durationMs) {
    const progress = t / durationMs;
    let interval;
    if (progress < 0.12) {
      interval = 34 - progress * 70;       // quick acceleration
    } else if (progress < 0.58) {
      interval = 22 + Math.random() * 6;   // fast middle
    } else if (progress < 0.82) {
      interval = 34 + progress * 38;       // slow-down begins
    } else {
      interval = 70 + progress * 95;       // distinct final ticks
    }
    interval = Math.max(20, interval);
    const tickTime = t;
    const speedFactor = 1 - progress * 0.65;
    spinTickTimers.push(setTimeout(() => playSpinTick(speedFactor), tickTime));
    t += interval;
  }
}

function startWithName() {
  const input = document.getElementById('champion-input');
  const name = (input?.value || '').trim();
  championName = name || 'Champion';
  document.getElementById('name-overlay').style.display = 'none';
  document.getElementById('champion-name-display').textContent = championName.toUpperCase();
  startGenerator();
}

// Allow Enter key in input
document.getElementById('champion-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') startWithName();
});

// Focus input on load
setTimeout(() => document.getElementById('champion-input')?.focus(), 100);
</script>
